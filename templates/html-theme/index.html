<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{project_name}} — Proposal</title>
  <link rel="stylesheet" href="../pdf-style.css">
  <style>
    body { display: flex; margin: 0; }
    nav#sidebar {
      width: 260px; min-height: 100vh; padding: 1.5em 1em;
      background: #f5f5f5; border-right: 1px solid #ddd;
      position: fixed; overflow-y: auto;
    }
    nav#sidebar ul { list-style: none; padding: 0; }
    nav#sidebar li { margin: 0.3em 0; }
    nav#sidebar a { text-decoration: none; color: #333; }
    nav#sidebar a:hover { color: #0066cc; }
    main { margin-left: 280px; padding: 2em 3em; max-width: 900px; }
    .search-box { width: 100%; padding: 0.4em; margin-bottom: 1em; font-size: 10pt; }
    .badge {
      display: inline-block; font-size: 9pt; padding: 2px 6px;
      border-radius: 3px; color: #fff; margin-left: 0.5em;
    }
    .badge-confirmed  { background: #2e7d32; }
    .badge-tentative  { background: #f57f17; }
    .badge-pending    { background: #757575; }
  </style>
</head>
<body>
  <nav id="sidebar">
    <input type="text" class="search-box" placeholder="Search..." id="search">
    <ul id="toc">
      <!-- {{toc_entries}} -->
    </ul>
  </nav>
  <main id="content">
    <!-- {{proposal_content}} -->
  </main>
  <script>
    document.getElementById('search').addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase();
      document.querySelectorAll('#content h1, #content h2, #content h3, #content p, #content td').forEach(function(el) {
        var section = el.closest('section') || el.parentElement;
        if (section) section.style.display = el.textContent.toLowerCase().includes(q) || !q ? '' : '';
      });
    });
  </script>
</body>
</html>
